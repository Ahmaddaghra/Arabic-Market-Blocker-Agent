<!doctype html><html lang="en"><meta charset="utf-8"><meta name="viewport" content="width=device-width"><title>Northstar signup benchmark</title><style>body{font-family:system-ui;background:#f4f6f8;margin:0;display:grid;place-items:center;min-height:100vh;color:#172334}.box{background:white;width:min(440px,90vw);padding:36px;border-radius:14px;box-shadow:0 12px 50px #11223318}label{display:block;font-weight:650;margin:18px 0 7px}input{width:100%;padding:12px;box-sizing:border-box;border:1px solid #aeb9c3;border-radius:6px}button{width:100%;margin-top:22px;padding:13px;border:0;border-radius:6px;background:#126b4b;color:white;font-weight:700}.error{color:#b32d26;font-size:13px;min-height:18px;margin-top:5px}.success{color:#087848;font-weight:700;margin-top:16px}</style><main class="box"><h1>Create your workspace</h1><p>Controlled benchmark with documented Saudi-market failures.</p><form id="signup"><label for="fullName">Full name</label><input id="fullName" name="fullName" required aria-describedby="nameError"><div class="error" id="nameError"></div><label for="email">Work email</label><input id="email" name="email" type="email" required><label for="phone">Phone number</label><input id="phone" name="phone" type="tel" required aria-describedby="phoneError"><div class="error" id="phoneError"></div><label for="password">Password</label><input id="password" name="password" type="password" required><button>Create account</button><div id="success" class="success" hidden data-audit-success="true">Workspace created in benchmark mode.</div></form></main><script>const validateName=()=>nameError.textContent=/[^A-Za-z '-]/.test(fullName.value)?'Only English letters are allowed':'';const validatePhone=()=>phoneError.textContent=!/^\+1\d{10}$/.test(phone.value)?'Enter a valid US phone number':'';fullName.addEventListener('blur',validateName);phone.addEventListener('blur',validatePhone);signup.addEventListener('submit',e=>{e.preventDefault();validateName();validatePhone();success.hidden=Boolean(nameError.textContent||phoneError.textContent)})</script></html>
